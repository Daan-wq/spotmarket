name: Deployment smoke test

on:
  deployment_status:

permissions:
  contents: read

concurrency:
  group: deployment-smoke-${{ github.event.deployment.id }}
  cancel-in-progress: true

jobs:
  smoke:
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment_url != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out smoke test
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify deployed routes
        env:
          DEPLOYMENT_URL: ${{ github.event.deployment_status.environment_url }}
        run: node scripts/verify-preview-runtime.mjs "$DEPLOYMENT_URL"
