<!--
  Supabase Auth reset-password template source.
  Paste into Supabase Dashboard > Authentication > Email Templates > Reset Password.
  Delivery remains Supabase-managed; this file is the tracked UI source.
-->
<div style="background:#f7f9f9;margin:0;padding:40px 20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="max-width:560px;margin:0 auto;">
    <div style="margin-bottom:18px;color:#010405;font-size:20px;font-weight:900;font-style:italic;line-height:1;text-transform:uppercase;">ClipProfit</div>
    <div style="background:#fbfcfc;border:1px solid #d2d9db;border-radius:24px;padding:32px;box-shadow:0 2px 8px rgba(23,33,54,0.08),0 18px 48px rgba(23,33,54,0.08);">
      <div style="width:56px;height:6px;border-radius:999px;background:#5d5fef;margin-bottom:22px;"></div>
      <h2 style="color:#010405;font-size:28px;line-height:1.08;font-weight:800;margin:0 0 18px;">Reset your password</h2>
      <p style="color:#5a6569;font-size:15px;line-height:1.65;margin:0 0 18px;">
        Follow this link to choose a new password for your ClipProfit account.
      </p>
      <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#5d5fef;background:linear-gradient(135deg,#5d5fef,#3f41b3);color:#ffffff;text-decoration:none;padding:13px 28px;border-radius:999px;font-size:14px;font-weight:700;margin-top:8px;box-shadow:0 12px 26px rgba(93,95,239,0.24);">Reset password</a>
    </div>
    <p style="color:#5a6569;font-size:12px;line-height:1.6;margin:22px 8px 0;">
      If you did not request this password reset, you can ignore this email.
    </p>
  </div>
</div>
